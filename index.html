<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SmolTalk - SmolRP-135M Text Generation</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, monospace;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 20px;
    }
    
    .container {
      background: white;
      border-radius: 12px;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
      max-width: 700px;
      width: 100%;
      padding: 40px;
    }
    
    h1 {
      color: #333;
      margin-bottom: 10px;
      font-size: 28px;
    }
    
    .subtitle {
      color: #666;
      margin-bottom: 30px;
      font-size: 14px;
    }
    
    .input-group {
      margin-bottom: 20px;
    }
    
    label {
      display: block;
      margin-bottom: 8px;
      color: #333;
      font-weight: 500;
    }
    
    textarea {
      width: 100%;
      padding: 12px;
      border: 2px solid #ddd;
      border-radius: 8px;
      font-family: 'Courier New', monospace;
      font-size: 14px;
      resize: vertical;
      min-height: 80px;
      transition: border-color 0.3s;
    }
    
    textarea:focus {
      outline: none;
      border-color: #667eea;
    }
    
    .control-group {
      display: flex;
      align-items: center;
      gap: 15px;
      margin-bottom: 20px;
    }
    
    .control-group label {
      margin-bottom: 0;
      min-width: 100px;
    }
    
    input[type="range"] {
      flex: 1;
      height: 6px;
      border-radius: 3px;
      background: #ddd;
      outline: none;
      -webkit-appearance: none;
    }
    
    input[type="range"]::-webkit-slider-thumb {
      -webkit-appearance: none;
      appearance: none;
      width: 16px;
      height: 16px;
      border-radius: 50%;
      background: #667eea;
      cursor: pointer;
    }
    
    input[type="range"]::-moz-range-thumb {
      width: 16px;
      height: 16px;
      border-radius: 50%;
      background: #667eea;
      cursor: pointer;
      border: none;
    }
    
    .temp-display {
      min-width: 45px;
      text-align: right;
      font-weight: 600;
      color: #667eea;
    }
    
    .button-group {
      display: flex;
      gap: 10px;
      margin-bottom: 20px;
    }
    
    button {
      flex: 1;
      padding: 12px 20px;
      border: none;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s;
    }
    
    #generate-btn {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
    }
    
    #generate-btn:hover:not(:disabled) {
      transform: translateY(-2px);
      box-shadow: 0 10px 20px rgba(102, 126, 234, 0.3);
    }
    
    #generate-btn:disabled {
      opacity: 0.6;
      cursor: not-allowed;
    }
    
    .status {
      padding: 10px;
      border-radius: 6px;
      margin-bottom: 20px;
      font-size: 13px;
      font-weight: 500;
    }
    
    .status.loading {
      background: #e3f2fd;
      color: #1976d2;
    }
    
    .status.ready {
      background: #e8f5e9;
      color: #388e3c;
    }
    
    .status.error {
      background: #ffebee;
      color: #d32f2f;
    }
    
    #result {
      margin-top: 20px;
    }
    
    .result-container {
      display: flex;
      flex-direction: column;
      gap: 20px;
    }
    
    .prompt-section, .generation-section {
      border-top: 2px solid #f0f0f0;
      padding-top: 15px;
    }
    
    .prompt-section h3, .generation-section h3 {
      font-size: 13px;
      color: #666;
      text-transform: uppercase;
      margin-bottom: 10px;
      letter-spacing: 0.5px;
    }
    
    .prompt-text {
      color: #333;
      line-height: 1.6;
      font-style: italic;
    }
    
    .generation-item {
      background: #f9f9f9;
      border-left: 3px solid #667eea;
      padding: 12px;
      border-radius: 4px;
    }
    
    pre {
      margin: 0;
      overflow-x: auto;
    }
    
    code {
      font-family: 'Courier New', monospace;
      font-size: 13px;
      line-height: 1.5;
      color: #333;
      word-break: break-word;
      white-space: pre-wrap;
    }
    
    .error {
      color: #d32f2f;
      padding: 12px;
      background: #ffebee;
      border-radius: 6px;
      font-size: 13px;
    }
    
    @media (max-width: 600px) {
      .container {
        padding: 20px;
      }
      
      h1 {
        font-size: 22px;
      }
      
      .control-group {
        flex-wrap: wrap;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>💬 SmolTalk</h1>
    <p class="subtitle">SmolRP-135M-v0.9 with Transformers.js & web-llm</p>
    
    <div id="status" class="status loading">Loading model...</div>
    
    <div class="input-group">
      <label for="prompt-input">Enter your prompt:</label>
      <textarea
        id="prompt-input"
        placeholder="Start with a prompt and the model will continue the text..."></textarea>
    </div>
    
    <div class="control-group">
      <label for="temperature">Temperature:</label>
      <input 
        type="range" 
        id="temperature" 
        min="0.1" 
        max="2" 
        step="0.1" 
        value="0.7"
      >
      <span class="temp-display" id="temp-value">0.70</span>
    </div>
    
    <div class="button-group">
      <button id="generate-btn">Generate (Ctrl+Enter)</button>
    </div>
    
    <div id="result"></div>
  </div>
  
  <script type="module" src="/src/main.js"></script>
</body>
</html>
